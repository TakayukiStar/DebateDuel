<!DOCTYPE html>
<html lang="ja">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>AI English Coach v6</title>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link
      href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@400;500;700&family=JetBrains+Mono:wght@400;500&family=Noto+Sans+JP:wght@400;500;700&display=swap"
      rel="stylesheet"
    />
    <style>
      :root {
        --bg: #0f1117;
        --surface: #1a1d27;
        --surface-2: #252836;
        --surface-3: #2d3142;
        --border: #2e3247;
        --text: #e4e6f0;
        --text-muted: #8b8fa3;
        --accent: #6c5ce7;
        --accent-glow: rgba(108, 92, 231, 0.3);
        --green: #00b894;
        --green-glow: rgba(0, 184, 148, 0.3);
        --red: #e17055;
        --red-glow: rgba(225, 112, 85, 0.3);
        --yellow: #fdcb6e;
        --orange: #e17055;
        --blue: #74b9ff;
        --pink: #fd79a8;
        --radius: 16px;
      }
      * {
        margin: 0;
        padding: 0;
        box-sizing: border-box;
      }
      body {
        font-family: "DM Sans", "Noto Sans JP", sans-serif;
        background: var(--bg);
        color: var(--text);
        min-height: 100vh;
        display: flex;
        flex-direction: column;
        align-items: center;
      }

      /* Header */
      .header {
        padding: 10px 16px 6px;
        text-align: center;
        width: 100%;
        max-width: 720px;
      }
      .header h1 {
        font-size: 1.2rem;
        font-weight: 700;
        background: linear-gradient(135deg, #6c5ce7, #a29bfe, #74b9ff);
        -webkit-background-clip: text;
        -webkit-text-fill-color: transparent;
      }
      .header .subtitle {
        font-size: 0.65rem;
        color: var(--text-muted);
        margin-top: 1px;
        font-family: "JetBrains Mono", monospace;
      }

      /* Mode Cards - compact in session */
      .mode-cards {
        display: flex;
        gap: 6px;
        justify-content: center;
        margin-top: 8px;
        flex-wrap: wrap;
      }
      .mode-card {
        flex: 1;
        min-width: 110px;
        max-width: 155px;
        padding: 10px 6px;
        background: var(--surface);
        border: 2px solid var(--border);
        border-radius: 12px;
        cursor: pointer;
        transition: all 0.25s;
        text-align: center;
      }
      .mode-card:hover {
        border-color: var(--accent);
        background: var(--surface-2);
        transform: translateY(-2px);
      }
      .mode-card.selected {
        border-color: var(--accent);
        background: rgba(108, 92, 231, 0.12);
        box-shadow: 0 0 16px var(--accent-glow);
      }
      .mode-card.disabled {
        opacity: 0.4;
        pointer-events: none;
      }
      .mode-card .mc-icon {
        font-size: 1.5rem;
        margin-bottom: 3px;
      }
      .mode-card .mc-title {
        font-size: 0.75rem;
        font-weight: 700;
        color: var(--text);
        margin-bottom: 2px;
      }
      .mode-card .mc-desc {
        font-size: 0.62rem;
        color: var(--text-muted);
        line-height: 1.3;
      }
      /* Session中はdesc非表示 */
      .header.in-session .mc-desc {
        display: none;
      }
      .header.in-session .mc-icon {
        font-size: 1.1rem;
        margin-bottom: 1px;
      }
      .header.in-session .mode-card {
        padding: 6px 4px;
        min-width: 80px;
      }

      /* Action Buttons - compact row */
      .action-row {
        display: flex;
        gap: 8px;
        justify-content: center;
        margin-top: 12px;
        flex-wrap: wrap;
      }
      .action-btn {
        padding: 8px 20px;
        border-radius: 24px;
        font-family: "DM Sans", "Noto Sans JP", sans-serif;
        font-size: 0.78rem;
        font-weight: 600;
        cursor: pointer;
        transition: all 0.2s;
        border: 2px solid;
      }
      .action-btn:disabled {
        opacity: 0.35;
        cursor: not-allowed;
        transform: none;
      }
      .start-btn {
        border-color: var(--green);
        background: rgba(0, 184, 148, 0.12);
        color: var(--green);
      }
      .start-btn:not(:disabled):hover {
        background: var(--green);
        color: #fff;
        transform: scale(1.03);
      }
      .reset-btn {
        border-color: var(--red);
        background: rgba(225, 112, 85, 0.08);
        color: var(--red);
      }
      .reset-btn:not(:disabled):hover {
        background: var(--red);
        color: #fff;
        transform: scale(1.03);
      }
      .summary-btn {
        border-color: var(--blue);
        background: rgba(116, 185, 255, 0.08);
        color: var(--blue);
      }
      .summary-btn:not(:disabled):hover {
        background: var(--blue);
        color: #fff;
        transform: scale(1.03);
      }
      .quiz-btn {
        border-color: var(--pink);
        background: rgba(253, 121, 168, 0.08);
        color: var(--pink);
      }
      .quiz-btn:not(:disabled):hover {
        background: var(--pink);
        color: #fff;
        transform: scale(1.03);
      }

      /* Settings - compact */
      .settings-panel {
        display: none;
        margin-top: 6px;
      }
      .settings-panel.visible {
        display: block;
      }
      .toggle-row {
        display: flex;
        gap: 6px;
        justify-content: center;
        flex-wrap: wrap;
        margin-top: 4px;
      }
      .toggle-group {
        display: flex;
        gap: 2px;
        padding: 2px;
        background: var(--surface);
        border-radius: 8px;
        border: 1px solid var(--border);
      }
      .toggle-btn {
        padding: 4px 10px;
        border: none;
        background: transparent;
        color: var(--text-muted);
        font-family: "DM Sans", "Noto Sans JP", sans-serif;
        font-size: 0.68rem;
        font-weight: 500;
        border-radius: 6px;
        cursor: pointer;
        transition: all 0.2s;
        white-space: nowrap;
      }
      .toggle-btn.active {
        background: var(--accent);
        color: #fff;
        box-shadow: 0 2px 10px var(--accent-glow);
      }
      .toggle-btn.active-green {
        background: var(--green);
        color: #fff;
        box-shadow: 0 2px 10px var(--green-glow);
      }
      /* Speed: both on one line */
      .speed-compact {
        display: flex;
        align-items: center;
        gap: 6px;
        justify-content: center;
        margin-top: 4px;
        flex-wrap: wrap;
      }
      .speed-item {
        display: flex;
        align-items: center;
        gap: 4px;
      }
      .speed-label {
        font-size: 0.63rem;
        color: var(--text-muted);
        font-family: "JetBrains Mono", monospace;
      }
      .speed-slider {
        -webkit-appearance: none;
        width: 80px;
        height: 3px;
        background: var(--border);
        border-radius: 2px;
        outline: none;
      }
      .speed-slider::-webkit-slider-thumb {
        -webkit-appearance: none;
        width: 13px;
        height: 13px;
        border-radius: 50%;
        background: var(--accent);
        cursor: pointer;
      }
      .speed-val {
        font-size: 0.63rem;
        color: var(--text);
        font-family: "JetBrains Mono", monospace;
        min-width: 28px;
      }

      /* Status */
      /* Status - inline in chat */
      .status-bar-inline {
        padding: 4px 0;
        align-self: flex-start;
      }
      .status-pill {
        display: inline-flex;
        align-items: center;
        gap: 8px;
        padding: 5px 12px;
        background: var(--surface);
        border: 1px solid var(--border);
        border-radius: 20px;
        font-size: 0.72rem;
        color: var(--text-muted);
        font-family: "JetBrains Mono", monospace;
      }
      .status-dot {
        width: 7px;
        height: 7px;
        border-radius: 50%;
        background: var(--text-muted);
        transition: all 0.3s;
      }

      /* Gauge Slot - fixed just above controls */
      .gauge-slot {
        position: fixed;
        width: 100%;
        max-width: 720px;
        padding: 0 16px;
        z-index: 11;
        display: none;
      }
      .status-dot.listening {
        background: var(--red);
        box-shadow: 0 0 8px var(--red-glow);
        animation: pulse 1.2s infinite;
      }
      .status-dot.processing {
        background: var(--yellow);
        animation: pulse 0.8s infinite;
      }
      .status-dot.ready {
        background: var(--green);
        box-shadow: 0 0 8px var(--green-glow);
      }
      .status-dot.speaking {
        background: var(--blue);
        animation: pulse 1s infinite;
      }
      .status-dot.idle {
        background: var(--text-muted);
      }
      @keyframes pulse {
        0%,
        100% {
          opacity: 1;
          transform: scale(1);
        }
        50% {
          opacity: 0.5;
          transform: scale(0.8);
        }
      }

      /* Chat - scrollable, padding-bottom for fixed controls */
      .chat-container {
        flex: 1;
        width: 100%;
        max-width: 720px;
        padding: 0 12px;
        overflow-y: auto;
        display: flex;
        flex-direction: column;
        gap: 10px;
        padding-bottom: 240px;
      }
      .msg {
        max-width: 88%;
        padding: 11px 15px;
        border-radius: var(--radius);
        font-size: 0.9rem;
        line-height: 1.55;
        animation: fadeIn 0.3s ease-out;
      }
      @keyframes fadeIn {
        from {
          opacity: 0;
          transform: translateY(8px);
        }
        to {
          opacity: 1;
          transform: translateY(0);
        }
      }
      .msg.user {
        align-self: flex-end;
        background: var(--accent);
        color: #fff;
        border-bottom-right-radius: 4px;
      }
      .msg.user.pron-mode {
        background: linear-gradient(135deg, #e17055, #fd79a8);
      }
      .msg .label {
        font-size: 0.68rem;
        font-weight: 700;
        text-transform: uppercase;
        letter-spacing: 0.05em;
        margin-bottom: 3px;
        opacity: 0.7;
      }
      .msg .meta {
        font-size: 0.63rem;
        color: var(--text-muted);
        margin-top: 5px;
        font-family: "JetBrains Mono", monospace;
      }
      .msg.user .meta {
        color: rgba(255, 255, 255, 0.55);
      }
      .msg.ai {
        align-self: flex-start;
        background: var(--surface-2);
        border: 1px solid var(--border);
        border-bottom-left-radius: 4px;
      }
      .msg.ai .label {
        color: var(--green);
      }

      /* Replay button */
      .replay-btn {
        display: inline-flex;
        align-items: center;
        gap: 4px;
        margin-top: 6px;
        padding: 3px 10px;
        background: rgba(116, 185, 255, 0.1);
        border: 1px solid rgba(116, 185, 255, 0.25);
        border-radius: 12px;
        color: var(--blue);
        font-size: 0.68rem;
        cursor: pointer;
        transition: all 0.2s;
        border-style: solid;
      }
      .replay-btn:hover {
        background: rgba(116, 185, 255, 0.25);
      }

      /* Word confidence */
      .words-row {
        display: flex;
        flex-wrap: wrap;
        gap: 3px 6px;
      }
      .word-unit {
        display: inline-flex;
        flex-direction: column;
        align-items: center;
      }
      .word-text {
        font-size: 0.9rem;
        line-height: 1.3;
      }
      .word-score {
        font-size: 0.55rem;
        font-family: "JetBrains Mono", monospace;
        line-height: 1;
        margin-top: 1px;
        opacity: 0.75;
      }
      .word-bar {
        width: 100%;
        height: 2px;
        border-radius: 1px;
        margin-top: 1px;
      }
      .word-unit.high .word-text {
        color: #fff;
      }
      .word-unit.high .word-score {
        color: rgba(255, 255, 255, 0.5);
      }
      .word-unit.high .word-bar {
        background: var(--green);
      }
      .word-unit.medium .word-text {
        color: var(--yellow);
      }
      .word-unit.medium .word-score {
        color: var(--yellow);
      }
      .word-unit.medium .word-bar {
        background: var(--yellow);
      }
      .word-unit.low .word-text {
        color: var(--red);
        font-weight: 600;
      }
      .word-unit.low .word-score {
        color: var(--red);
      }
      .word-unit.low .word-bar {
        background: var(--red);
      }
      .conf-legend {
        font-size: 0.58rem;
        color: rgba(255, 255, 255, 0.45);
        margin-top: 6px;
      }

      /* Scene cards */
      .scene-card {
        background: var(--surface-2);
        border: 1px solid var(--border);
        border-radius: 10px;
        padding: 9px 13px;
        cursor: pointer;
        transition: all 0.2s;
        display: flex;
        align-items: center;
        gap: 8px;
      }
      .scene-card:hover {
        border-color: var(--accent);
        background: var(--surface-3);
        transform: translateX(3px);
      }
      .scene-card .sc-num {
        font-size: 0.7rem;
        font-weight: 700;
        color: var(--accent);
        min-width: 18px;
      }
      .scene-card .sc-text {
        font-size: 0.84rem;
        color: var(--text);
      }
      .scene-card .sc-ja {
        font-size: 0.72rem;
        color: var(--text-muted);
        margin-top: 2px;
      }
      .scenes-list {
        display: flex;
        flex-direction: column;
        gap: 6px;
        margin-top: 8px;
      }

      /* Coach Card */
      .coach-card {
        align-self: flex-start;
        max-width: 95%;
        background: var(--surface);
        border: 1px solid var(--border);
        border-left: 3px solid var(--pink);
        border-radius: 12px;
        padding: 14px 16px;
        font-size: 0.84rem;
        animation: fadeIn 0.4s ease-out;
      }
      .coach-header {
        font-size: 0.72rem;
        font-weight: 700;
        color: var(--pink);
        text-transform: uppercase;
        letter-spacing: 0.06em;
        margin-bottom: 10px;
      }
      .coach-message {
        color: var(--text);
        line-height: 1.7;
        font-size: 0.85rem;
        white-space: pre-line;
        margin-bottom: 10px;
      }
      .coach-section {
        margin-bottom: 10px;
      }
      .coach-label {
        font-size: 0.7rem;
        font-weight: 700;
        color: var(--text-muted);
        margin-bottom: 4px;
      }
      .practice-words {
        display: flex;
        gap: 8px;
        flex-wrap: wrap;
        margin: 8px 0;
      }
      .practice-word {
        font-size: 0.95rem;
        font-weight: 700;
        padding: 8px 16px;
        border-radius: 10px;
        background: linear-gradient(
          135deg,
          rgba(253, 121, 168, 0.12),
          rgba(108, 92, 231, 0.08)
        );
        border: 1px solid rgba(253, 121, 168, 0.25);
        color: var(--text);
        cursor: pointer;
        transition: all 0.2s;
      }
      .practice-word:hover {
        background: rgba(253, 121, 168, 0.25);
        transform: scale(1.05);
      }
      .score-section {
        padding: 10px 14px;
        background: rgba(0, 184, 148, 0.06);
        border: 1px solid rgba(0, 184, 148, 0.2);
        border-radius: 10px;
        margin: 8px 0;
      }
      .score-section .score-text {
        color: var(--text);
        line-height: 1.6;
        font-size: 0.83rem;
        white-space: pre-line;
      }
      .tip-section {
        padding: 10px 14px;
        background: rgba(116, 185, 255, 0.06);
        border: 1px solid rgba(116, 185, 255, 0.2);
        border-radius: 10px;
        margin: 8px 0;
      }
      .tip-section .tip-text {
        color: var(--text);
        line-height: 1.6;
        font-size: 0.83rem;
        white-space: pre-line;
      }
      .tip-section .tip-text::before {
        content: "👄 ";
      }
      .encouragement {
        font-size: 0.9rem;
        font-weight: 600;
        color: var(--pink);
        padding: 8px 12px;
        background: rgba(253, 121, 168, 0.08);
        border-radius: 10px;
        text-align: center;
        margin-top: 8px;
      }

      /* Learning Card */
      .learning-card {
        align-self: flex-start;
        max-width: 95%;
        background: var(--surface);
        border: 1px solid var(--border);
        border-left: 3px solid var(--green);
        border-radius: 12px;
        padding: 14px 16px;
        font-size: 0.84rem;
        animation: fadeIn 0.4s ease-out;
      }
      .lc-header {
        display: flex;
        align-items: center;
        gap: 6px;
        font-size: 0.72rem;
        font-weight: 700;
        color: var(--green);
        text-transform: uppercase;
        letter-spacing: 0.06em;
        margin-bottom: 10px;
      }
      .lc-section {
        margin-bottom: 10px;
      }
      .lc-label {
        font-size: 0.7rem;
        font-weight: 700;
        color: var(--text-muted);
        margin-bottom: 3px;
      }
      .lc-translation {
        color: var(--blue);
        font-size: 0.85rem;
        padding: 6px 10px;
        background: rgba(116, 185, 255, 0.08);
        border-radius: 8px;
        margin-bottom: 8px;
      }
      .lc-explanation {
        color: var(--text);
        line-height: 1.6;
        font-size: 0.83rem;
      }
      .suggestion-list {
        display: flex;
        flex-direction: column;
        gap: 8px;
        margin-top: 6px;
      }
      .suggestion-item {
        background: var(--surface-2);
        border: 1px solid var(--border);
        border-radius: 10px;
        padding: 10px 12px;
        cursor: pointer;
        transition: all 0.2s;
      }
      .suggestion-item:hover {
        border-color: var(--accent);
        background: var(--surface-3);
        transform: translateX(3px);
      }
      .sg-en {
        font-weight: 600;
        color: var(--text);
        font-size: 0.88rem;
        margin-bottom: 3px;
      }
      .sg-badge {
        display: inline-block;
        font-size: 0.6rem;
        font-weight: 700;
        padding: 1px 6px;
        border-radius: 4px;
        margin-right: 4px;
      }
      .sg-badge.easy {
        background: rgba(0, 184, 148, 0.2);
        color: var(--green);
      }
      .sg-badge.pro {
        background: rgba(0, 184, 148, 0.2);
        color: var(--green);
      }
      .sg-badge.medium {
        background: rgba(253, 203, 110, 0.2);
        color: var(--yellow);
      }
      .sg-badge.con {
        background: rgba(225, 112, 85, 0.2);
        color: var(--orange);
      }
      .sg-badge.advanced {
        background: rgba(225, 112, 85, 0.2);
        color: var(--orange);
      }
      .sg-badge.reframe {
        background: rgba(108, 92, 231, 0.2);
        color: var(--accent);
      }
      .sg-badge.weak {
        background: rgba(150, 150, 150, 0.2);
        color: #999;
      }
      .sg-badge.strong {
        background: rgba(0, 184, 148, 0.25);
        color: var(--green);
      }
      .sg-badge.killer {
        background: linear-gradient(
          135deg,
          rgba(253, 203, 110, 0.3),
          rgba(108, 92, 231, 0.3)
        );
        color: #ffd700;
        text-shadow: 0 0 4px rgba(255, 215, 0, 0.3);
      }
      .sg-ja {
        color: var(--text-muted);
        font-size: 0.78rem;
        line-height: 1.5;
      }

      /* Debate Stance Buttons */
      .stance-container {
        margin: 12px 0;
        text-align: center;
      }
      .stance-label {
        font-size: 0.85rem;
        color: var(--text-muted);
        margin-bottom: 8px;
      }
      .stance-buttons {
        display: flex;
        gap: 8px;
        justify-content: center;
        flex-wrap: wrap;
      }
      .stance-btn {
        padding: 10px 20px;
        border-radius: 12px;
        font-size: 0.82rem;
        font-weight: 700;
        cursor: pointer;
        border: 2px solid;
        transition: all 0.2s;
        font-family: "DM Sans", "Noto Sans JP", sans-serif;
      }
      .stance-btn:hover {
        transform: scale(1.05);
      }
      .stance-btn.pro-btn {
        border-color: var(--green);
        background: rgba(0, 184, 148, 0.1);
        color: var(--green);
      }
      .stance-btn.pro-btn:hover {
        background: var(--green);
        color: #fff;
      }
      .stance-btn.con-btn {
        border-color: var(--orange);
        background: rgba(225, 112, 85, 0.1);
        color: var(--orange);
      }
      .stance-btn.con-btn:hover {
        background: var(--orange);
        color: #fff;
      }
      .stance-btn.neutral-btn {
        border-color: var(--accent);
        background: rgba(108, 92, 231, 0.1);
        color: var(--accent);
      }
      .stance-btn.neutral-btn:hover {
        background: var(--accent);
        color: #fff;
      }

      /* Battle Gauge */
      .battle-gauge {
        margin: 8px 0 4px;
        padding: 10px 14px;
        background: var(--surface);
        border: 1px solid var(--border);
        border-radius: 12px;
      }
      .gauge-header {
        display: flex;
        justify-content: space-between;
        font-size: 0.72rem;
        font-weight: 600;
        margin-bottom: 5px;
      }
      .gauge-you {
        color: #e17055;
      }
      .gauge-ai {
        color: #74b9ff;
      }
      .gauge-bar {
        height: 14px;
        border-radius: 7px;
        background: #2d3436;
        overflow: hidden;
        display: flex;
      }
      .gauge-fill-you {
        background: linear-gradient(90deg, #e17055, #fab1a0);
        transition: width 0.8s ease;
        border-radius: 7px 0 0 7px;
      }
      .gauge-fill-ai {
        background: linear-gradient(90deg, #74b9ff, #0984e3);
        transition: width 0.8s ease;
        border-radius: 0 7px 7px 0;
      }
      .gauge-score {
        text-align: center;
        font-size: 0.72rem;
        font-weight: 700;
        margin-top: 3px;
        color: var(--text-muted);
      }

    <script>
      // ============================================================================
      // State
      // ============================================================================
      let lessonMode = null;
      let sessionActive = false;
      let sessionId = null;
      let currentSttMode = "whisper";
      let narrationOn = true;
      let isRecording = false;
      let mediaRecorder = null;
      let audioChunks = [];
      let audioStream = null;
      let isSpeaking = false;
      let aborted = false;
      let currentAudio = null;
      let lastRecordingUrl = null; // ★ 発音比較用: ユーザーの最後の録音
      // TTS queue management - central abort controller
      let ttsAbortController = null;

      // ★ TTS パイプライン設定（上部で調整可能）
      const TTS_FIRST_CHUNK_SIZE = 80; // 最初のチャンクの最大文字数
      const TTS_CHUNK_SIZE = 150; // 2番目以降のチャンクの最大文字数

      const SpeechRecognition =
        window.SpeechRecognition || window.webkitSpeechRecognition;
      let recognition = null;
      if (SpeechRecognition) {
        recognition = new SpeechRecognition();
        recognition.lang = "en-US";
        recognition.interimResults = false;
      }
      const synth = window.speechSynthesis;

      const micBtn = document.getElementById("mic-btn");
      const micLabel = document.getElementById("mic-label");
      const statusDot = document.getElementById("status-dot");
      const statusText = document.getElementById("status-text");
      const chatEl = document.getElementById("chat");
      const startBtn = document.getElementById("start-btn");
      const resetBtn = document.getElementById("reset-btn");
      const summaryBtn = document.getElementById("summary-btn");
      const quizBtn = document.getElementById("quiz-btn");
      const textInput = document.getElementById("text-input");
      const sendBtn = document.getElementById("send-btn");

      // ============================================================================
      // TTS — Edge TTS with generation-based abort (stale chains are fully killed)
      // ============================================================================
      function getJaSpeed() {
        return parseFloat(document.getElementById("ja-speed").value);
      }
      function getEnSpeed() {
        return parseFloat(document.getElementById("en-speed").value);
      }

      // ★ 世代管理: abortAllTTS()を呼ぶたびにインクリメント
      // 古い世代のedgeTTS呼び出しは全て即returnする
      let ttsGeneration = 0;

      function abortAllTTS() {
        ttsGeneration++; // ★ 世代を進める → 古い世代のTTSチェーンは全て死ぬ
        aborted = true;
        synth.cancel();
        if (currentAudio) {
          currentAudio.pause();
          currentAudio.src = "";
          currentAudio = null;
        }
        if (ttsAbortController) {
          ttsAbortController.abort();
          ttsAbortController = null;
        }
      }

      async function edgeTTS(text, lang) {
        const myGen = ttsGeneration; // ★ この呼び出しが属する世代を記録
        if (myGen !== ttsGeneration) return;

        const rate = lang === "ja" ? getJaSpeed() : getEnSpeed();
        const controller = new AbortController();
        ttsAbortController = controller;
        try {
          const res = await fetch("/tts", {
            method: "POST",
            headers: { "Content-Type": "application/json" },
            body: JSON.stringify({ text, lang, rate }),
            signal: controller.signal,
          });
          // ★ fetch後に世代チェック（fetch中にabortされた場合）
          if (myGen !== ttsGeneration) return;
          if (!res.ok) throw new Error("TTS error");
          const blob = await res.blob();
          if (myGen !== ttsGeneration) return;
          const url = URL.createObjectURL(blob);
          return new Promise((resolve) => {
            if (myGen !== ttsGeneration) {
              URL.revokeObjectURL(url);
              resolve();
              return;
            }
            // ★ 前のTTSを強制停止（常に1つだけ再生）
            if (currentAudio) {
              currentAudio.pause();
              currentAudio.src = "";
              currentAudio = null;
            }
            const audio = new Audio(url);
            currentAudio = audio;
            audio.onended = () => {
              currentAudio = null;
              URL.revokeObjectURL(url);
              resolve();
            };
            audio.onerror = () => {
              currentAudio = null;
              URL.revokeObjectURL(url);
              resolve();
            };
            audio.play().catch(() => {
              URL.revokeObjectURL(url);
              resolve();
            });
          });
        } catch (e) {
          if (e.name === "AbortError") return;
          if (myGen !== ttsGeneration) return;
          // Fallback to browser TTS
          return new Promise((resolve) => {
            if (myGen !== ttsGeneration) {
              resolve();
              return;
            }
            const u = new SpeechSynthesisUtterance(text);
            u.lang = lang === "ja" ? "ja-JP" : "en-US";
            u.rate = rate;
            u.onend = resolve;
            u.onerror = resolve;
            synth.speak(u);
          });
        }
      }

      // ============================================================================
      // TTS パイプライン — テキストを分割し、[0]即再生 + 残りをバックグラウンドprefetch
      // ============================================================================

      // テキスト分割: maxLen以下で最も良い区切り位置で切る
      function splitTextAt(text, maxLen) {
        if (text.length <= maxLen) return [text];
        // 優先度順の区切り文字: 改行 > 。！？> 、 > スペース
        const delimiters = [
          "\n",
          "。",
          "！",
          "？",
          "!",
          "?",
          "、",
          ".",
          ",",
          " ",
        ];
        let bestPos = -1;
        for (const d of delimiters) {
          const pos = text.lastIndexOf(d, maxLen);
          if (pos > maxLen * 0.3) {
            bestPos = pos + 1;
            break;
          }
        }
        if (bestPos <= 0) bestPos = maxLen; // フォールバック: 強制切断
        return [
          text.slice(0, bestPos).trim(),
          ...splitTextAt(text.slice(bestPos).trim(), maxLen),
        ];
      }

      function splitForTTS(text) {
        if (!text || text.length <= TTS_FIRST_CHUNK_SIZE) return [text];
        // 最初のチャンクは小さく（即再生用）
        const first = splitTextAt(text, TTS_FIRST_CHUNK_SIZE);
        if (first.length === 1) return first;
        const firstChunk = first[0];
        const remaining = first.slice(1).join(" ");
        // 残りはTTS_CHUNK_SIZEで分割
        const restChunks = splitTextAt(remaining, TTS_CHUNK_SIZE);
        return [firstChunk, ...restChunks].filter((c) => c.length > 0);
      }

      // パイプライン付きTTS: [0]を即再生、[1]以降はバックグラウンドでprefetch
      async function speakText(text, lang) {
        const myGen = ttsGeneration;
        const chunks = splitForTTS(text);
        if (chunks.length === 0) return;

        // 1チャンクだけなら普通にedgeTTS
        if (chunks.length === 1) {
          await edgeTTS(chunks[0], lang);
          return;
        }

        const rate = lang === "ja" ? getJaSpeed() : getEnSpeed();

        // 全チャンクのfetchを同時に開始（パイプライン）
        const fetchPromises = chunks.map((chunk, i) => {
          if (myGen !== ttsGeneration) return Promise.resolve(null);
          const controller = new AbortController();
          if (i === 0) ttsAbortController = controller;
          return fetch("/tts", {
            method: "POST",
            headers: { "Content-Type": "application/json" },
            body: JSON.stringify({ text: chunk, lang, rate }),
            signal: controller.signal,
          })
            .then((r) => (r.ok ? r.blob() : null))
            .catch(() => null);
        });

        // 順番に再生（前のチャンク再生中に次のチャンクがfetch完了している）
        for (let i = 0; i < chunks.length; i++) {
          if (myGen !== ttsGeneration) return;
          const blob = await fetchPromises[i];
          if (!blob || myGen !== ttsGeneration) return;
          const url = URL.createObjectURL(blob);
          await new Promise((resolve) => {
            if (myGen !== ttsGeneration) {
              URL.revokeObjectURL(url);
              resolve();
              return;
            }
            // ★ 前のTTSを強制停止
            if (currentAudio) {
              currentAudio.pause();
              currentAudio.src = "";
              currentAudio = null;
            }
            const audio = new Audio(url);
            currentAudio = audio;
            audio.onended = () => {
              currentAudio = null;
              URL.revokeObjectURL(url);
              resolve();
            };
            audio.onerror = () => {
              currentAudio = null;
              URL.revokeObjectURL(url);
              resolve();
            };
            audio.play().catch(() => {
              URL.revokeObjectURL(url);
              resolve();
            });
          });
        }
      }

      // prefetch済みの最初のチャンクを使ってTTS再生を高速化
      async function speakTextWithPrefetch(text, lang, prefetchPromise, gen) {
        if (!prefetchPromise) {
          await speakText(text, lang);
          return;
        }
        const chunks = splitForTTS(text);
        const blob = await prefetchPromise;
        if (!blob || gen !== ttsGeneration) {
          await speakText(text, lang);
          return;
        }
        // [0]はprefetchから即再生
        const url = URL.createObjectURL(blob);
        await new Promise((resolve) => {
          if (gen !== ttsGeneration) {
            URL.revokeObjectURL(url);
            resolve();
            return;
          }
          // ★ 前のTTSを強制停止
          if (currentAudio) {
            currentAudio.pause();
            currentAudio.src = "";
            currentAudio = null;
          }
          const audio = new Audio(url);
          currentAudio = audio;
          audio.onended = () => {
            currentAudio = null;
            URL.revokeObjectURL(url);
            resolve();
          };
          audio.onerror = () => {
            currentAudio = null;
            URL.revokeObjectURL(url);
            resolve();
          };
          audio.play().catch(() => {
            URL.revokeObjectURL(url);
            resolve();
          });
        });
        // 残りチャンクはspeakTextパイプラインで
        if (chunks.length > 1 && gen === ttsGeneration) {
          await speakText(chunks.slice(1).join(""), lang);
        }
      }

      // ============================================================================
      function selectLesson(mode) {
        if (sessionActive) return;
        abortAllTTS();
        isSpeaking = false;
        lessonMode = mode;
        document
          .getElementById("card-beginner")
          .classList.toggle("selected", mode === "beginner");
        document
          .getElementById("card-conversation")
          .classList.toggle("selected", mode === "conversation");
        document
          .getElementById("card-pronunciation")
          .classList.toggle("selected", mode === "pronunciation");
        document
          .getElementById("card-debate")
          .classList.toggle("selected", mode === "debate");
        startBtn.disabled = false;
        const names = {
          beginner: "はじめの一歩",
          conversation: "フランク会話塾",
          pronunciation: "英語発音小屋",
          debate: "World Debate",
        };
        setStatus("idle", `「${names[mode]}」を選択中 — Start で開始`);
      }

      // ============================================================================
      // Start Session
      // ============================================================================
      async function startSession() {
        if (!lessonMode || sessionActive) return;
        // ★ 開始時: 残存TTS即中断
        abortAllTTS();
        isSpeaking = false;
        aborted = false; // ★ abortedをリセット（新しいセッション）
        sessionActive = true;
        document.querySelector(".header").classList.add("in-session");
        startBtn.disabled = true;
        resetBtn.disabled = false;
        summaryBtn.disabled = false;
        quizBtn.disabled = lessonMode !== "pronunciation";
        document
          .querySelectorAll(".mode-card")
          .forEach((c) => c.classList.add("disabled"));
        micBtn.disabled = true;
        textInput.disabled = true;
        sendBtn.disabled = true;
        setStatus("processing", "コーチが準備中…");
        showTypingIndicator();

        try {
          const res = await fetch("/start", {
            method: "POST",
            headers: { "Content-Type": "application/json" },
            body: JSON.stringify({ lesson_mode: lessonMode }),
          });
          const data = await res.json();
          sessionId = data.session_id;

          // ★ API応答と同時にTTS最初のチャンクをprefetch開始
          let prefetchPromise = null;
          const replyText = data.reply || "";
          if (replyText) {
            const lang = lessonMode === "pronunciation" ? "ja" : "en";
            const rate = lang === "ja" ? getJaSpeed() : getEnSpeed();
            const fc = splitForTTS(replyText)[0];
            if (fc)
              prefetchPromise = fetch("/tts", {
                method: "POST",
                headers: { "Content-Type": "application/json" },
                body: JSON.stringify({ text: fc, lang, rate }),
              })
                .then((r) => (r.ok ? r.blob() : null))
                .catch(() => null);
          }

          if (lessonMode === "pronunciation") {
            const card = document.createElement("div");
            card.className = "coach-card";
            card.innerHTML = `<div class="coach-header">👄 コーチ</div><div class="coach-message">${esc(
              data.reply
            )}</div>`;
            chatEl.appendChild(card);
            scrollBottom();
            if (data.scenes && data.scenes.length > 0)
              addSceneCards(data.scenes, data.scenes_ja || []);
            isSpeaking = true;
            const gen = ttsGeneration;
            removeTypingIndicator();
            // ★ TTS開始時にコントロールを有効化（割り込み可能にする）
            micBtn.disabled = false;
            textInput.disabled = false;
            sendBtn.disabled = false;
            setStatus("speaking", "🔊 コーチが話しています…");
            await speakTextWithPrefetch(data.reply, "ja", prefetchPromise, gen);
          } else {
            addAIMsg(data.reply);
            if (data.scenes && data.scenes.length > 0)
              addSceneCards(data.scenes, data.scenes_ja || []);
            isSpeaking = true;
            const gen = ttsGeneration;
            removeTypingIndicator();
            // ★ TTS開始時にコントロールを有効化（割り込み可能にする）
            micBtn.disabled = false;
            textInput.disabled = false;
            sendBtn.disabled = false;
            setStatus("speaking", "🔊 コーチが話しています…");
            await speakTextWithPrefetch(data.reply, "en", prefetchPromise, gen);
            if (narrationOn && data.reply_ja && gen === ttsGeneration) {
              setStatus("speaking", "📚 日本語で解説中…");
              await speakText(data.reply_ja, "ja");
            }
          }
          finishSpeaking();
          setStatus(
            "ready",
            lessonMode === "pronunciation"
              ? "カテゴリを選んでください"
              : "準備完了！英語で話しかけてください"
          );
          micLabel.textContent = "タップして録音（Space で操作）";
        } catch (err) {
          removeTypingIndicator();
          console.error(err);
          const fallbacks = {
            pronunciation: "英語発音小屋へようこそ！カテゴリを選んでください。",
            beginner: "Hello! Let's practice simple English!",
            debate: "Welcome to the Debate Arena. Please try again.",
            conversation: "Hello! Welcome to English practice.",
          };
          addAIMsg(fallbacks[lessonMode] || fallbacks.conversation);
          finishSpeaking();
          setStatus("ready", "準備完了");
        }
      }

      function finishSpeaking() {
        isSpeaking = false;
        micBtn.disabled = false;
        textInput.disabled = false;
        sendBtn.disabled = false;
      }

      // ============================================================================
      // Reset Session
      // ============================================================================
      function resetSession() {
        // ★ リセット時: 無条件でTTS即中断
        abortAllTTS();
        isSpeaking = false;
        sessionActive = false;
        document.querySelector(".header").classList.remove("in-session");
        sessionId = null;
        startBtn.disabled = false;
        resetBtn.disabled = true;
        summaryBtn.disabled = true;
        quizBtn.disabled = true;
        micBtn.disabled = true;
        textInput.disabled = true;
        sendBtn.disabled = true;
        document
          .querySelectorAll(".mode-card")
          .forEach((c) => c.classList.remove("disabled"));
        chatEl.innerHTML =
          '<div class="status-bar-inline"><div class="status-pill"><span class="status-dot idle" id="status-dot"></span><span id="status-text">モードを選択してください</span></div></div>';
        chatEl.style.paddingBottom = "240px";
        debateGaugeEl = null;
        document.getElementById("gauge-slot").style.display = "none";
        document.getElementById("gauge-slot").innerHTML = "";
        resetTurnBadge();
        const modeName =
          lessonMode === "conversation" ? "フランク会話塾" : "英語発音小屋";
        setStatus("idle", `「${modeName}」— Start で再開できます`);
        micLabel.textContent = "Start を押して再開してください";
      }

      // ============================================================================
      // Scene Cards
      // ============================================================================
      function addSceneCards(scenes, scenesJa) {
        const container = document.createElement("div");
        container.className = "msg ai";
        container.style.maxWidth = "95%";
        const isPron = lessonMode === "pronunciation";
        const isDebate = lessonMode === "debate";
        const isBeginner = lessonMode === "beginner";
        let labelText = isPron
          ? "👄 コーチ"
          : isDebate
          ? "⚔️ Professor"
          : isBeginner
          ? "🌱 Coach"
          : "AI Coach";
        let html = `<div class="label">${labelText}</div>`;
        if (isPron) {
          html +=
            '<div style="margin-bottom:6px;font-size:.85rem;">練習したいカテゴリを選んでくださいね：</div>';
        } else if (isDebate) {
          html +=
            '<div style="margin-bottom:6px;font-size:.85rem;">Choose your arena:<br><span style="color:var(--text-muted);font-size:.78rem;">討論テーマを選んでください：</span></div>';
        } else if (isBeginner) {
          html +=
            '<div style="margin-bottom:6px;font-size:.85rem;">Let\'s pick a scene!<br><span style="color:var(--text-muted);font-size:.78rem;">練習したいシーンを選びましょう：</span></div>';
        } else {
          html +=
            '<div style="margin-bottom:6px;font-size:.85rem;">What would you like to talk about?<br><span style="color:var(--text-muted);font-size:.78rem;">話したいトピックを選んでください：</span></div>';
        }
        html += '<div class="scenes-list">';
        scenes.forEach((s, i) => {
          const ja = scenesJa[i] || "";
          const escapedS = s.replace(/`/g, "").replace(/'/g, "\\'");
          const escapedJa = ja.replace(/`/g, "").replace(/'/g, "\\'");
          html += `<div class="scene-card" onclick="pickScene(\`${escapedS}\`, \`${escapedJa}\`)">
      <div class="sc-num">${i + 1}</div>
      <div><div class="sc-text">${esc(s)}</div>${
            ja ? `<div class="sc-ja">${esc(ja)}</div>` : ""
          }</div>
    </div>`;
        });
        // 非pronunciationモード: 自由トピック
        if (!isPron) {
          const freeLabel = isDebate
            ? "Free debate - your topic"
            : "Free talk - any topic";
          const freeJa = isDebate
            ? "自由討論（好きなテーマで議論）"
            : "自由に話す（トピックなし）";
          html += `<div class="scene-card" onclick="pickScene(\`${freeLabel}\`, \`${freeJa}\`)" style="border-color:var(--green);">
      <div class="sc-num">🆓</div>
      <div><div class="sc-text">${
        isDebate ? "Free debate" : "Free talk"
      }</div><div class="sc-ja">${freeJa}</div></div>
    </div>`;
        }
        html += "</div>";
        container.innerHTML = html;
        chatEl.appendChild(container);
        scrollBottom();
      }

      async function pickScene(sceneText, sceneJa) {
        if (micBtn.disabled && !isSpeaking) return;
        // ★ シーン選択時: 無条件でTTS即中断
        abortAllTTS();
        isSpeaking = false;
        aborted = false;

        document
          .querySelectorAll(".scenes-list")
          .forEach((el) => (el.style.display = "none"));
        const displayMeta =
          lessonMode === "pronunciation" ? "カテゴリ選択" : "トピック選択";
        // ユーザーメッセージ: 英語 + 改行で小さい日本語
        const jaLine = sceneJa
          ? `<div style="font-size:.72rem;opacity:.75;margin-top:4px">${esc(
              sceneJa
            )}</div>`
          : "";
        const d = document.createElement("div");
        d.className = "msg user";
        d.innerHTML = `<div class="label">You</div>${esc(
          sceneText
        )}${jaLine}<div class="meta">${esc(displayMeta)}</div>`;
        chatEl.appendChild(d);
        scrollBottom();
        showTypingIndicator();
        setStatus("processing", "コーチが準備中…");
        micBtn.disabled = true;
        textInput.disabled = true;
        sendBtn.disabled = true;
        isSpeaking = true;

        try {
          const res = await fetch("/select_scene", {
            method: "POST",
            headers: { "Content-Type": "application/json" },
            body: JSON.stringify({
              lesson_mode: lessonMode,
              scene: sceneText,
              session_id: sessionId,
            }),
          });
          const data = await res.json();

          // ★ API応答受信と同時にTTS最初のチャンクをprefetch開始
          let prefetchPromise = null;
          if (
            lessonMode === "pronunciation" &&
            data.coach_message &&
            narrationOn
          ) {
            const firstChunk = splitForTTS(data.coach_message)[0];
            if (firstChunk)
              prefetchPromise = fetch("/tts", {
                method: "POST",
                headers: { "Content-Type": "application/json" },
                body: JSON.stringify({
                  text: firstChunk,
                  lang: "ja",
                  rate: getJaSpeed(),
                }),
              })
                .then((r) => (r.ok ? r.blob() : null))
                .catch(() => null);
          } else if (data.reply) {
            const firstChunk = splitForTTS(data.reply)[0];
            const lang = lessonMode === "pronunciation" ? "ja" : "en";
            const rate = lang === "ja" ? getJaSpeed() : getEnSpeed();
            if (firstChunk)
              prefetchPromise = fetch("/tts", {
                method: "POST",
                headers: { "Content-Type": "application/json" },
                body: JSON.stringify({ text: firstChunk, lang, rate }),
              })
                .then((r) => (r.ok ? r.blob() : null))
                .catch(() => null);
          }
          // thinkingバーはfetch前に表示済み → そのまま維持

          if (lessonMode === "pronunciation" && data.coach_message) {
            removeTypingIndicator();
            micBtn.disabled = false;
            textInput.disabled = false;
            sendBtn.disabled = false;
            renderPronunciationResponse(data, prefetchPromise);
          } else if (data.debate_stance_choice) {
            // ★ Debate: 立場選択を促す → ボタン表示
            const gen = ttsGeneration;
            addAIMsg(data.reply);
            removeTypingIndicator();
            micBtn.disabled = false;
            textInput.disabled = false;
            sendBtn.disabled = false;
            showStanceButtons();
            setStatus("speaking", "🔊 Professor が話しています…");
            await speakTextWithPrefetch(data.reply, "en", prefetchPromise, gen);
            if (narrationOn && data.reply_ja && gen === ttsGeneration) {
              await speakText(data.reply_ja, "ja");
            }
            finishSpeaking();
            setStatus("ready", "立場を選択してください 👆");
            return;
          } else if (data.reply) {
            const gen = ttsGeneration;
            addAIMsg(data.reply);
            removeTypingIndicator();
            // ★ コントロールを有効化（割り込み可能）
            micBtn.disabled = false;
            textInput.disabled = false;
            sendBtn.disabled = false;
            setStatus("speaking", "🔊 コーチが話しています…");
            await speakTextWithPrefetch(data.reply, "en", prefetchPromise, gen);
            let learningShown = false;
            if (data.learning && gen === ttsGeneration) {
              addLearningCard(data.learning);
              learningShown = true;
              if (narrationOn && gen === ttsGeneration) {
                setStatus("speaking", "📚 日本語で解説中…");
                await speakText(
                  `コーチの回答です。${data.learning.reply_ja}`,
                  "ja"
                );
                if (gen === ttsGeneration)
                  await speakText(data.learning.explanation, "ja");
                const levels = ["初級", "中級", "上級"];
                for (
                  let i = 0;
                  i < (data.learning.suggestions || []).length &&
                  gen === ttsGeneration;
                  i++
                ) {
                  const s = data.learning.suggestions[i];
                  await edgeTTS(`${levels[i]}の回答例。`, "ja");
                  if (gen === ttsGeneration) await edgeTTS(s.english, "en");
                  if (gen === ttsGeneration) await edgeTTS(s.japanese, "ja");
                }
              }
            }
            if (data.learning && !learningShown) addLearningCard(data.learning);
            if (gen === ttsGeneration)
              setStatus("ready", "準備完了 — 英語で答えてみましょう！🎤");
          }
        } catch (err) {
          removeTypingIndicator();
          console.error("select_scene error:", err);
          setStatus("ready", "エラーが発生しました");
        }
        finishSpeaking();
      }

      // ============================================================================
      // Settings
      // ============================================================================
      function updateSpeedLabel() {
        document.getElementById("ja-speed-val").textContent =
          "×" +
          parseFloat(document.getElementById("ja-speed").value).toFixed(1);
        document.getElementById("en-speed-val").textContent =
          "×" +
          parseFloat(document.getElementById("en-speed").value).toFixed(1);
      }
      function setSttMode(mode) {
        currentSttMode = mode;
        document
          .querySelectorAll("[data-mode]")
          .forEach((b) =>
            b.classList.toggle("active", b.dataset.mode === mode)
          );
      }
      function setNarration(val) {
        narrationOn = val === "on";
        document.querySelectorAll("[data-narr]").forEach((b) => {
          if (b.dataset.narr === val) b.classList.add("active-green");
          else b.classList.remove("active-green");
        });
        if (!narrationOn && isSpeaking) stopTTS();
      }
      function setStatus(state, text) {
        statusDot.className = "status-dot " + state;
        statusText.textContent = text;
      }

      function skipTTS() {
        abortAllTTS();
        isSpeaking = false;
        ttsGeneration++;
        setStatus("ready", "スキップしました");
        micBtn.disabled = false;
        textInput.disabled = false;
        sendBtn.disabled = false;
      }

      // ============================================================================
      // Internal TTS stop helper (called by user actions, not by dedicated button)
      // ============================================================================
      function stopTTS() {
        abortAllTTS();
        isSpeaking = false;
        if (sessionActive) {
          setStatus("ready", "完了！もう一度話せます。");
          micBtn.disabled = false;
          textInput.disabled = false;
          sendBtn.disabled = false;
        }
      }

      // ============================================================================
      // Recording — pressing mic ABORTS all TTS first
      // ============================================================================
      function toggleRecording() {
        if (!sessionActive) return;
        // ★ マイクボタン押下時: 状態に関係なく無条件でTTS/音声を全停止
        abortAllTTS();
        isSpeaking = false;
        micBtn.disabled = false;
        textInput.disabled = false;
        sendBtn.disabled = false;
        // 録音中なら停止→送信、停止中なら録音開始
        if (isRecording) stopRecording();
        else startRecording();
      }

      async function startRecording() {
        // aborted はここではリセットしない！
        // TTS連鎖を確実に止めるため、processUserText の冒頭でリセットする

        if (currentSttMode === "browser") {
          if (!recognition) {
            setStatus("ready", "Web Speech API非対応");
            return;
          }
          isRecording = true;
          micBtn.classList.add("recording");
          setStatus("listening", "聴いています…");
          recognition.start();
          recognition.onresult = async (e) => {
            const t = e.results[0][0].transcript;
            stopRecordingUI();
            await processUserText(t, "Web Speech API", [], 0.9);
          };
          recognition.onerror = () => {
            stopRecordingUI();
            setStatus("ready", "エラー");
          };
          recognition.onend = () => {
            if (isRecording) stopRecordingUI();
          };
          return;
        }
        try {
          audioStream = await navigator.mediaDevices.getUserMedia({
            audio: {
              sampleRate: 16000,
              channelCount: 1,
              echoCancellation: true,
              noiseSuppression: true,
            },
          });
        } catch {
          setStatus("ready", "マイクアクセス拒否");
          return;
        }
        audioChunks = [];
        mediaRecorder = new MediaRecorder(audioStream, {
          mimeType: MediaRecorder.isTypeSupported("audio/webm;codecs=opus")
            ? "audio/webm;codecs=opus"
            : "audio/webm",
        });
        mediaRecorder.ondataavailable = (e) => {
          if (e.data.size > 0) audioChunks.push(e.data);
        };
        mediaRecorder.onstop = async () => {
          if (audioStream) {
            audioStream.getTracks().forEach((t) => t.stop());
            audioStream = null;
          }
          if (!audioChunks.length) {
            setStatus("ready", "音声なし");
            micBtn.disabled = false;
            return;
          }
          const blob = new Blob(audioChunks, { type: "audio/webm" });
          audioChunks = [];
          // ★ 発音比較用: 録音データを保持
          if (lastRecordingUrl) URL.revokeObjectURL(lastRecordingUrl);
          lastRecordingUrl = URL.createObjectURL(blob);
          setStatus("processing", "Whisper で認識中…");
          showTypingIndicator("thinking");
          micBtn.disabled = true;
          try {
            const fd = new FormData();
            fd.append("audio", blob, "recording.webm");
            const res = await fetch("/transcribe", {
              method: "POST",
              body: fd,
            });
            const data = await res.json();
            if (data.error || !data.text?.trim()) {
              removeTypingIndicator();
              setStatus("ready", data.error || "音声未検出");
              micBtn.disabled = false;
              return;
            }
            await processUserText(
              data.text,
              `Whisper ${data.processing_time}s | conf: ${(
                data.avg_confidence * 100
              ).toFixed(0)}%`,
              data.words || [],
              data.avg_confidence
            );
          } catch {
            removeTypingIndicator();
            setStatus("ready", "サーバー通信エラー");
            micBtn.disabled = false;
          }
        };
        mediaRecorder.start();
        isRecording = true;
        micBtn.classList.add("recording");
        micLabel.textContent = "マイク or 送信ボタンで録音停止";
        sendBtn.textContent = "録音停止";
        sendBtn.disabled = false;
        setStatus("listening", "録音中…");
      }

      function stopRecording() {
        if (currentSttMode === "browser") {
          if (recognition) recognition.stop();
        } else if (mediaRecorder?.state === "recording") mediaRecorder.stop();
        stopRecordingUI();
      }

      function stopRecordingUI() {
        isRecording = false;
        micBtn.classList.remove("recording");
        micLabel.textContent = "タップして録音（Space で操作）";
        sendBtn.textContent = "送信";
      }

      // ============================================================================
      // Text Input
      // ============================================================================
      function sendTextInput() {
        // ★ 録音中なら、送信ボタン＝録音停止（＝音声送信）として動作
        if (isRecording) {
          stopRecording();
          return;
        }
        const txt = textInput.value.trim();
        if (!txt || !sessionActive) return;
        textInput.value = "";
        // ★ テキスト送信時: 無条件でTTS即中断
        abortAllTTS();
        isSpeaking = false;
        aborted = false;
        processUserText(txt, "テキスト入力", [], 0.95);
      }
      textInput.addEventListener("keydown", (e) => {
        if (e.key === "Enter" && !e.shiftKey) {
          e.preventDefault();
          sendTextInput();
        }
      });

      // ============================================================================
      // Main flow
      // ============================================================================
      async function processUserText(text, meta, words, avgConf) {
        // ★ 処理開始時: 安全のためTTS即中断
        abortAllTTS();
        isSpeaking = false;
        aborted = false;

        addUserMsg(text, meta, words);
        updateTurnBadge();
        showTypingIndicator();
        setStatus("processing", "AI が考えています…");
        micBtn.disabled = true;
        textInput.disabled = true;
        sendBtn.disabled = true;
        isSpeaking = true;

        // Use /chat_text for text input, /chat for voice
        const endpoint =
          meta === "テキスト入力" || meta === "suggestion"
            ? "/chat_text"
            : "/chat";

        try {
          const res = await fetch(endpoint, {
            method: "POST",
            headers: { "Content-Type": "application/json" },
            body: JSON.stringify({
              text,
              avg_confidence: avgConf || 1.0,
              words: words || [],
              lesson_mode: lessonMode,
              session_id: sessionId,
            }),
          });
          const data = await res.json();

          // ★ API応答と同時にTTS最初のチャンクをprefetch
          let prefetchPromise = null;
          if (
            lessonMode === "pronunciation" &&
            data.coach_message &&
            narrationOn
          ) {
            const fc = splitForTTS(data.coach_message)[0];
            if (fc)
              prefetchPromise = fetch("/tts", {
                method: "POST",
                headers: { "Content-Type": "application/json" },
                body: JSON.stringify({
                  text: fc,
                  lang: "ja",
                  rate: getJaSpeed(),
                }),
              })
                .then((r) => (r.ok ? r.blob() : null))
                .catch(() => null);
          } else if (data.reply) {
            const fc = splitForTTS(data.reply)[0];
            if (fc)
              prefetchPromise = fetch("/tts", {
                method: "POST",
                headers: { "Content-Type": "application/json" },
                body: JSON.stringify({
                  text: fc,
                  lang: "en",
                  rate: getEnSpeed(),
                }),
              })
                .then((r) => (r.ok ? r.blob() : null))
                .catch(() => null);
          }

          if (lessonMode === "pronunciation" && data.coach_message) {
            removeTypingIndicator();
            micBtn.disabled = false;
            textInput.disabled = false;
            sendBtn.disabled = false;
            renderPronunciationResponse(data, prefetchPromise);
          } else if (data.debate_stance_choice) {
            // ★ Debate: 立場未選択 → ボタン再表示
            addAIMsg(data.reply);
            removeTypingIndicator();
            micBtn.disabled = false;
            textInput.disabled = false;
            sendBtn.disabled = false;
            showStanceButtons();
            setStatus("ready", "立場を選択してください 👆");
          } else {
            const gen = ttsGeneration;
            addAIMsg(data.reply);
            removeTypingIndicator();
            micBtn.disabled = false;
            textInput.disabled = false;
            sendBtn.disabled = false;
            // ★ Debate: ジャッジ情報を即座に反映（TTS待ち前に！）
            if (
              lessonMode === "debate" &&
              data.judge &&
              data.judge.user_score !== undefined
            ) {
              console.log(
                "DEBUG judge update:",
                data.judge.user_score,
                data.judge.reason
              );
              updateBattleGauge(
                data.judge.user_score,
                data.judge.reason || "",
                ""
              );
            }
            // ★ Debate: フィニッシュ判定
            if (lessonMode === "debate" && data.debate_finish) {
              await handleDebateFinish(
                data.debate_finish,
                data.reply,
                prefetchPromise,
                gen
              );
              return;
            }
            setStatus("speaking", "🔊 コーチが話しています…");
            await speakTextWithPrefetch(data.reply, "en", prefetchPromise, gen);
            let learningShown = false;
            if (data.learning && gen === ttsGeneration) {
              addLearningCard(data.learning);
              learningShown = true;
              if (narrationOn && gen === ttsGeneration) {
                setStatus("speaking", "📚 日本語で解説中…");
                await speakText(
                  `コーチの回答です。${data.learning.reply_ja}`,
                  "ja"
                );
                if (gen === ttsGeneration)
                  await speakText(data.learning.explanation, "ja");
                const levels = ["初級", "中級", "上級"];
                for (
                  let i = 0;
                  i < data.learning.suggestions.length && gen === ttsGeneration;
                  i++
                ) {
                  const s = data.learning.suggestions[i];
                  let label;
                  if (lessonMode === "debate") {
                    const q = (s.quality || "").toLowerCase();
                    if (q === "killer") label = "最強の切り返し";
                    else if (q === "strong") label = "有効な回答例";
                    else if (q === "weak") label = "イマイチな回答例";
                    else label = `回答例${i + 1}`;
                  } else {
                    label = levels[i % levels.length] + "の回答例";
                  }
                  await edgeTTS(`${label}。`, "ja");
                  if (gen === ttsGeneration) await edgeTTS(s.english, "en");
                  if (gen === ttsGeneration) await edgeTTS(s.japanese, "ja");
                }
              }
            }
            if (data.learning && !learningShown) addLearningCard(data.learning);
            if (gen === ttsGeneration)
              setStatus("ready", "完了！もう一度話せます。");
          }
        } catch (err) {
          removeTypingIndicator();
          console.error(err);
          setStatus("ready", "エラー");
        }
        finishSpeaking();
      }

      // ============================================================================
      // Pronunciation Response
      // ============================================================================
      function renderPronunciationResponse(data, prefetchPromise) {
        // ★ prefetchPromiseがなければ自前でprefetch開始
        let ttsPrefetchPromise = prefetchPromise || null;
        if (!ttsPrefetchPromise && narrationOn && data.coach_message) {
          const rate = getJaSpeed();
          const firstChunk = splitForTTS(data.coach_message)[0];
          if (firstChunk) {
            ttsPrefetchPromise = fetch("/tts", {
              method: "POST",
              headers: { "Content-Type": "application/json" },
              body: JSON.stringify({ text: firstChunk, lang: "ja", rate }),
            })
              .then((r) => (r.ok ? r.blob() : null))
              .catch(() => null);
          }
        }

        const card = document.createElement("div");
        card.className = "coach-card";
        let html = `<div class="coach-header">👄 コーチ</div>`;
        html += `<div class="coach-message">${esc(
          data.coach_message || ""
        )}</div>`;
        if (data.score_feedback) {
          html += `<div class="coach-section"><div class="coach-label">📊 採点結果</div>
      <div class="score-section"><div class="score-text">${esc(
        data.score_feedback
      )}</div></div></div>`;
        }
        if (data.pronunciation_tip) {
          html += `<div class="coach-section"><div class="coach-label">💡 発音のコツ</div>
      <div class="tip-section"><div class="tip-text">${esc(
        data.pronunciation_tip
      )}</div></div></div>`;
        }
        const words = data.english_words || [];
        if (words.length > 0) {
          html += `<div class="coach-section"><div class="coach-label">🎯 練習単語（タップで発音を聴く）</div><div class="practice-words">`;
          words.forEach((w) => {
            html += `<span class="practice-word" onclick="playWord('${w.replace(
              /'/g,
              ""
            )}')">${esc(w)}</span>`;
          });
          html += `</div></div>`;
        }
        const next = data.next_challenge || [];
        if (next.length > 0) {
          html += `<div class="coach-section"><div class="coach-label">⬆️ 次のチャレンジ（タップで聴く）</div><div class="practice-words">`;
          next.forEach((w) => {
            html += `<span class="practice-word" onclick="playWord('${w.replace(
              /'/g,
              ""
            )}')">${esc(w)}</span>`;
          });
          html += `</div></div>`;
        }
        // ★ 発音比較セクション（録音がある場合）
        if (lastRecordingUrl && data.score_feedback) {
          html += `<div class="coach-section"><div class="coach-label">🔄 発音を比較する</div>
      <div class="compare-section">
        <button class="compare-btn my-play" onclick="playMyRecording()">🎙️ 自分の発音</button>
        ${
          words.length > 0
            ? `<button class="compare-btn coach-play" onclick="playWord('${words[0].replace(
                /'/g,
                ""
              )}')" >🔊 お手本</button>`
            : ""
        }
      </div></div>`;
        }
        if (data.encouragement) {
          html += `<div class="encouragement">${esc(data.encouragement)}</div>`;
        }
        card.innerHTML = html;
        chatEl.appendChild(card);
        scrollBottom();

        if (narrationOn) speakPronResponse(data, ttsPrefetchPromise);
        else {
          setStatus("ready", "準備完了 — マイクで発音してみましょう！🎤");
          finishSpeaking();
        }
      }

      async function speakPronResponse(data, prefetchPromise) {
        const gen = ttsGeneration;
        setStatus("speaking", "🔊 コーチが話しています…");

        if (data.coach_message && gen === ttsGeneration) {
          if (prefetchPromise) {
            // ★ 最初のチャンクはprefetch済み → 即再生
            const chunks = splitForTTS(data.coach_message);
            const firstBlob = await prefetchPromise;
            if (firstBlob && gen === ttsGeneration) {
              const url = URL.createObjectURL(firstBlob);
              await new Promise((resolve) => {
                if (gen !== ttsGeneration) {
                  URL.revokeObjectURL(url);
                  resolve();
                  return;
                }
                const audio = new Audio(url);
                currentAudio = audio;
                audio.onended = () => {
                  currentAudio = null;
                  URL.revokeObjectURL(url);
                  resolve();
                };
                audio.onerror = () => {
                  currentAudio = null;
                  URL.revokeObjectURL(url);
                  resolve();
                };
                audio.play().catch(() => {
                  URL.revokeObjectURL(url);
                  resolve();
                });
              });
              // 残りチャンクはspeakTextパイプラインで
              if (chunks.length > 1 && gen === ttsGeneration) {
                await speakText(chunks.slice(1).join(""), "ja");
              }
            } else {
              await speakText(data.coach_message, "ja");
            }
          } else {
            await speakText(data.coach_message, "ja");
          }
        }
        if (data.score_feedback && gen === ttsGeneration)
          await speakText(data.score_feedback, "ja");
        if (data.pronunciation_tip && gen === ttsGeneration) {
          await edgeTTS("発音のコツです。", "ja");
          if (gen === ttsGeneration)
            await speakText(data.pronunciation_tip, "ja");
        }
        const ew = data.english_words || [];
        if (ew.length > 0 && gen === ttsGeneration) {
          await edgeTTS("練習単語をお手本で読みますね。", "ja");
          for (const w of ew) {
            if (gen !== ttsGeneration) break;
            await edgeTTS(w, "en");
            await new Promise((r) => setTimeout(r, 400));
          }
        }
        const nc = data.next_challenge || [];
        if (nc.length > 0 && gen === ttsGeneration) {
          await edgeTTS("次のチャレンジ単語です。", "ja");
          for (const w of nc) {
            if (gen !== ttsGeneration) break;
            await edgeTTS(w, "en");
            await new Promise((r) => setTimeout(r, 300));
          }
        }
        if (data.encouragement && gen === ttsGeneration)
          await speakText(data.encouragement, "ja");
        if (gen === ttsGeneration)
          setStatus("ready", "準備完了 — マイクで発音してみましょう！🎤");
        finishSpeaking();
      }

      function playWord(w) {
        if (currentAudio) {
          currentAudio.pause();
          currentAudio.src = "";
          currentAudio = null;
        }
        edgeTTS(w, "en");
      }

      function playMyRecording() {
        if (!lastRecordingUrl) return;
        if (currentAudio) {
          currentAudio.pause();
          currentAudio.src = "";
          currentAudio = null;
        }
        const audio = new Audio(lastRecordingUrl);
        currentAudio = audio;
        audio.onended = () => {
          currentAudio = null;
        };
        audio.play().catch(() => {});
      }

      // ============================================================================
      // Thinking indicator — API待ち＆TTS準備中、controls上部に表示
      // ============================================================================
      const thinkingPhases = {
        thinking: [
          { emoji: "✨", text: "Coach is thinking..." },
          { emoji: "💭", text: "Preparing your lesson..." },
          { emoji: "📖", text: "Crafting a response..." },
          { emoji: "🎯", text: "Analyzing your answer..." },
          { emoji: "🔮", text: "Working on it..." },
        ],
        preparing: [
          { emoji: "🎵", text: "Preparing audio..." },
          { emoji: "🔊", text: "Getting voice ready..." },
          { emoji: "🎤", text: "Almost there..." },
        ],
      };

      function showTypingIndicator(phase) {
        const bar = document.getElementById("thinking-bar");
        const msgs = thinkingPhases[phase || "thinking"];
        const msg = msgs[Math.floor(Math.random() * msgs.length)];
        bar.querySelector(".thinking-emoji").textContent = msg.emoji;
        bar.querySelector(".thinking-text").textContent = msg.text;
        bar.classList.add("visible");
      }
      function removeTypingIndicator() {
        document.getElementById("thinking-bar").classList.remove("visible");
      }

      // ============================================================================
      // Turn counter
      // ============================================================================
      let turnCount = 0;
      const MAX_TURNS = 30;
      function updateTurnBadge() {
        turnCount++;
        const badge = document.getElementById("turn-badge");
        badge.textContent = `Turn ${turnCount}/${MAX_TURNS}`;
        badge.classList.add("visible");
        if (turnCount >= MAX_TURNS - 5) badge.style.color = "var(--yellow)";
        if (turnCount >= MAX_TURNS) {
          badge.style.color = "var(--red)";
          suggestSummary();
        }
      }
      function resetTurnBadge() {
        turnCount = 0;
        const badge = document.getElementById("turn-badge");
        badge.classList.remove("visible");
        badge.style.color = "";
      }
      function suggestSummary() {
        const d = document.createElement("div");
        d.className = "msg ai";
        d.innerHTML = `<div class="label">SYSTEM</div>
    <div>🎓 ${MAX_TURNS}ターンに達しました！<br>「📊 まとめ」ボタンで今日のレッスンを振り返りましょう。</div>`;
        chatEl.appendChild(d);
        scrollBottom();
      }

      // Chat rendering

      function esc(s) {
        const d = document.createElement("div");
        d.textContent = s;
