      async function selectStance(stance) {
        // ★ 立場選択時: TTS即時遮断
        abortAllTTS();
        isSpeaking = false;
        // ボタンを非活性に＋選択したボタンを塗りつぶし
        document.querySelectorAll(".stance-btn").forEach((b) => {
          b.disabled = true;
          b.style.opacity = "0.4";
        });
        const clicked = document.querySelector(`.stance-btn.${stance}-btn`);
        if (clicked) {
          clicked.style.opacity = "1";
          if (stance === "pro") {
            clicked.style.background = "var(--green)";
            clicked.style.color = "#fff";
          } else if (stance === "con") {
            clicked.style.background = "var(--orange)";
            clicked.style.color = "#fff";
          } else {
            clicked.style.background = "var(--accent)";
            clicked.style.color = "#fff";
          }
        }
        const labels = {
          pro: "👍 賛成派",
          con: "👎 反対派",
          neutral: "⚖️ 中立派",
        };
        addUserMsg(labels[stance] || stance, "立場選択", []);
        showTypingIndicator();
        setStatus("processing", "Professor が開始準備中…");
        micBtn.disabled = true;
        textInput.disabled = true;
        sendBtn.disabled = true;
        isSpeaking = true;

        try {
          const res = await fetch("/debate_stance", {
            method: "POST",
            headers: { "Content-Type": "application/json" },
            body: JSON.stringify({ stance, session_id: sessionId }),
          });
          const data = await res.json();

          let prefetchPromise = null;
          if (data.reply) {
            const fc = splitForTTS(data.reply)[0];
            if (fc)
              prefetchPromise = fetch("/tts", {
                method: "POST",
                headers: { "Content-Type": "application/json" },
                body: JSON.stringify({
                  text: fc,
                  lang: "en",
                  rate: getEnSpeed(),
                }),
              })
                .then((r) => (r.ok ? r.blob() : null))
                .catch(() => null);
          }

          const gen = ttsGeneration;
          addAIMsg(data.reply);
          // ★ バトルゲージを初期表示 (50:50)
          addBattleGauge(
            50,
            "討論開始！最初の一手でゲージが動きます。あなたの主張を英語で述べましょう！",
            ""
          );
          // ★ Learning Card表示（解説＋最初の応答候補）
          if (data.learning) addLearningCard(data.learning);
          removeTypingIndicator();
          micBtn.disabled = false;
          textInput.disabled = false;
          sendBtn.disabled = false;
          setStatus("speaking", "🔊 Professor が話しています…");
          await speakTextWithPrefetch(data.reply, "en", prefetchPromise, gen);
          if (narrationOn && data.reply_ja && gen === ttsGeneration) {
            setStatus("speaking", "📚 日本語訳…");
            await speakText(data.reply_ja, "ja");
          }
        } catch (err) {
          console.error(err);
        }
        removeTypingIndicator();
        finishSpeaking();
        setStatus("ready", "討論開始！あなたの主張を英語で述べてください 🎤");
      }

      // ============================================================================
      // Debate: Battle Gauge
      // ============================================================================
      let debateGaugeEl = null;

      function addBattleGauge(userScore, reasonJa, reasonEn) {
        const slot = document.getElementById("gauge-slot");
        if (debateGaugeEl) {
          updateBattleGauge(userScore, reasonJa, reasonEn);
          return;
        }
        const el = document.createElement("div");
        el.className = "battle-gauge";
        el.id = "battle-gauge";
        el.innerHTML = `
    <div class="gauge-header"><span class="gauge-you">🔴 YOU</span><span class="gauge-ai">🔵 PROFESSOR</span></div>
    <div class="gauge-bar"><div class="gauge-fill-you" id="gauge-you" style="width:${userScore}%"></div><div class="gauge-fill-ai" id="gauge-ai" style="width:${
          100 - userScore
        }%"></div></div>
    <div class="gauge-score" id="gauge-label">${userScore} : ${
          100 - userScore
        }</div>
    <div class="judge-toggle" onclick="toggleJudgeReason()">📋 ジャッジの評価を見る ▼</div>
    <div class="judge-reason" id="judge-reason">${esc(
      reasonJa || "討論開始！最初の一手でゲージが動きます。"
    )}</div>`;
        slot.innerHTML = "";
        slot.appendChild(el);
        slot.style.display = "block";
        debateGaugeEl = el;
        // ★ controlsの高さを取得してゲージの位置を設定
        positionGaugeSlot();
        // chat padding-bottomも増やす
        chatEl.style.paddingBottom = "330px";
      }

      function positionGaugeSlot() {
        const slot = document.getElementById("gauge-slot");
        const ctrl = document.querySelector(".controls");
        if (!slot || !ctrl) return;
        const ctrlH = ctrl.offsetHeight;
        slot.style.bottom = ctrlH + "px";
      }

      function updateBattleGauge(userScore, reasonJa, reasonEn) {
        if (!debateGaugeEl) {
          addBattleGauge(userScore, reasonJa, reasonEn);
          return;
        }
        const youEl = document.getElementById("gauge-you");
        const aiEl = document.getElementById("gauge-ai");
        const labelEl = document.getElementById("gauge-label");
        const reasonEl = document.getElementById("judge-reason");
        if (youEl) youEl.style.width = userScore + "%";
        if (aiEl) aiEl.style.width = 100 - userScore + "%";
        if (labelEl) labelEl.textContent = `${userScore} : ${100 - userScore}`;
        if (reasonEl)
          reasonEl.textContent =
            reasonJa ||
            "まだ十分なやり取りがなく、評価中です。議論を続けましょう！";
      }

      function toggleJudgeReason() {
        const el = document.getElementById("judge-reason");
        if (!el) return;
        const isHidden = el.style.display === "none" || !el.style.display;
        el.style.display = isHidden ? "block" : "none";
        const toggle = el.previousElementSibling;
        if (toggle)
          toggle.textContent = isHidden
            ? "📋 ジャッジの評価を閉じる ▲"
            : "📋 ジャッジの評価を見る ▼";
      }

      async function callJudge() {
        if (lessonMode !== "debate" || !sessionId) return;
        try {
          const res = await fetch("/judge", {
            method: "POST",
            headers: { "Content-Type": "application/json" },
            body: JSON.stringify({ session_id: sessionId }),
          });
          const data = await res.json();
          updateBattleGauge(
            data.user_score || 50,
            data.reason_ja || "",
            data.reason_en || ""
          );
        } catch (e) {
          console.error("Judge error:", e);
        }
      }

      // ============================================================================
      // Debate Finish Animations
      // ============================================================================
      function playVictoryAnimation() {
        const colors = [
          "#ffd700",
          "#ff6b6b",
          "#48dbfb",
          "#ff9ff3",
          "#00d2d3",
          "#feca57",
          "#ff9f43",
          "#a29bfe",
        ];
        const shapes = ["■", "●", "▲", "★", "♦", "◆"];
        for (let i = 0; i < 80; i++) {
          const el = document.createElement("div");
          el.className = "confetti-piece";
          el.style.left = Math.random() * 100 + "vw";
          el.style.background =
            colors[Math.floor(Math.random() * colors.length)];
          el.textContent = shapes[Math.floor(Math.random() * shapes.length)];
          el.style.color = colors[Math.floor(Math.random() * colors.length)];
          el.style.fontSize = 8 + Math.random() * 14 + "px";
          el.style.width = "auto";
          el.style.height = "auto";
          const dur = 2 + Math.random() * 2;
          el.style.animation = `confettiFall ${dur}s ease-out ${
            Math.random() * 1.5
          }s forwards`;
          document.body.appendChild(el);
          setTimeout(() => el.remove(), (dur + 1.5) * 1000);
        }
        // Cracker emoji burst
        for (let i = 0; i < 6; i++) {
          const cracker = document.createElement("div");
          cracker.style.cssText = `position:fixed;z-index:10000;font-size:3rem;pointer-events:none;
      left:${15 + Math.random() * 70}vw;top:${10 + Math.random() * 30}vh;
      animation:thinkingPulse 0.5s ease-out;opacity:0;`;
          cracker.textContent = ["🎉", "🎊", "🏆", "✨", "🥳", "💫"][i];
          document.body.appendChild(cracker);
          setTimeout(() => {
            cracker.style.opacity = "1";
            cracker.style.transition = "opacity 0.3s";
          }, i * 200);
          setTimeout(() => {
            cracker.style.opacity = "0";
          }, 2500 + i * 200);
          setTimeout(() => cracker.remove(), 3500);
        }
      }

      function playDefeatAnimation() {
        for (let i = 0; i < 5; i++) {
          const el = document.createElement("div");
          el.className = "falling-leaf";
          el.textContent = "🍂";
          el.style.left = 10 + Math.random() * 80 + "vw";
          el.style.fontSize = 1.5 + Math.random() * 1 + "rem";
          const dur = 3.5 + Math.random() * 2;
          el.style.animation = `leafFall ${dur}s ease-in ${i * 0.4}s forwards`;
          document.body.appendChild(el);
          setTimeout(() => el.remove(), (dur + 2) * 1000);
        }
      }

      function playDrawAnimation() {
        const emojis = ["⚔️", "🤝", "💪", "🔥", "⚡"];
        for (let i = 0; i < 12; i++) {
          const el = document.createElement("div");
          el.style.cssText = `position:fixed;z-index:9999;pointer-events:none;font-size:${
            1.5 + Math.random()
          }rem;
      left:${Math.random() * 100}vw;top:${Math.random() * 60 + 10}vh;opacity:0;
      transition:all 0.5s ease-out;`;
          el.textContent = emojis[Math.floor(Math.random() * emojis.length)];
          document.body.appendChild(el);
          setTimeout(() => {
            el.style.opacity = "1";
            el.style.transform = `scale(1.3) translateY(-20px)`;
          }, i * 100);
          setTimeout(() => {
            el.style.opacity = "0";
            el.style.transform = `scale(0.5) translateY(-40px)`;
          }, 1500 + i * 100);
          setTimeout(() => el.remove(), 3000);
        }
      }

      // ============================================================================
      // Debate Finish Handler
      // ============================================================================
      async function handleDebateFinish(
        resultType,
        lastReply,
        prefetchPromise,
        gen
      ) {
        // 1. まずProfessorの最後の発言を再生
        setStatus("speaking", "🔊 Professor の最後の応答…");
        await speakTextWithPrefetch(lastReply, "en", prefetchPromise, gen);

        // 2. Geminiにまとめを依頼
        setStatus("processing", "📝 討論のまとめを準備中…");
        showTypingIndicator();
        try {
          const res = await fetch("/debate_finish", {
            method: "POST",
            headers: { "Content-Type": "application/json" },
            body: JSON.stringify({ session_id: sessionId, result: resultType }),
          });
          const data = await res.json();
          removeTypingIndicator();

          // ★ 勝敗アニメーション発火！
          if (resultType === "student_wins") playVictoryAnimation();
          else if (resultType === "draw") playDrawAnimation();
          else playDefeatAnimation();

          // 3. フィニッシュカードを表示
          const icons = {
            student_wins: "🏆",
            professor_wins: "📖",
            draw: "🤝",
          };
          const titles = {
            student_wins: "YOU WIN! — Professorが降参しました",
            professor_wins: "GAME OVER — Professorの勝利です",
            draw: "DRAW — 激闘の末、引き分け！",
          };
          const cardClasses = {
            student_wins: "finish-card-win",
            professor_wins: "finish-card-lose",
            draw: "finish-card-draw",
          };
          const icon = icons[resultType] || "🤝";
          const title = titles[resultType] || "討論終了";
          const scoreText = `最終スコア: ${data.final_score || 50} : ${
            100 - (data.final_score || 50)
          }`;
          const card = document.createElement("div");
          card.className =
            "learning-card " + (cardClasses[resultType] || "finish-card-draw");
          card.innerHTML = `
      <div class="lc-header" style="font-size:1.1rem">${icon} ${title}</div>
      <div class="lc-section"><div class="lc-label">🎯 ${scoreText}</div></div>
      <div class="lc-section"><div class="lc-label">🎤 Professor's Closing Statement</div>
        <div class="lc-translation" style="color:var(--text);font-weight:500">${esc(
          data.reply || ""
        )}</div></div>
      <div class="lc-section"><div class="lc-label">🔤 日本語訳</div>
        <div class="lc-translation">${esc(data.reply_ja || "")}</div></div>
      <div class="lc-section"><div class="lc-label">💡 今後のアドバイス</div>
        <div class="lc-explanation">${esc(data.advice || "")}</div></div>
      <div style="text-align:center;margin-top:12px">
        <button onclick="location.reload()" style="padding:10px 28px;border-radius:20px;border:none;background:var(--accent);color:#fff;font-weight:700;font-size:0.95rem;cursor:pointer">🔄 新しいレッスンを始める</button>
      </div>`;
          chatEl.appendChild(card);
          scrollBottom();

          // 4. TTS: まとめスピーチを読み上げ
          if (data.reply && gen === ttsGeneration) {
            setStatus("speaking", "🎤 Professor のまとめ…");
            await speakText(data.reply, "en");
          }
          if (data.reply_ja && gen === ttsGeneration) {
            await speakText(data.reply_ja, "ja");
          }
          if (data.advice && gen === ttsGeneration) {
            await speakText(data.advice, "ja");
          }

          // 5. 入力を無効化
          micBtn.disabled = true;
          textInput.disabled = true;
          sendBtn.disabled = true;
          setStatus(
            "ready",
            resultType === "student_wins"
              ? "🏆 おめでとうございます！"
              : resultType === "draw"
              ? "🤝 互角の戦い！"
              : "📖 次はもっと頑張りましょう！"
          );
        } catch (err) {
          removeTypingIndicator();
          console.error("Debate finish error:", err);
          setStatus("ready", "討論終了");
        }
        finishSpeaking();
      }

      // ============================================================================
      // Chat rendering (continued)
      // ============================================================================

      function addUserMsg(text, meta, words) {
        const d = document.createElement("div");
        d.className =
          "msg user" + (lessonMode === "pronunciation" ? " pron-mode" : "");
        let wordHTML = "";
        if (words && words.length > 0) {
          const spans = words
            .map((w) => {
              const c = w.confidence,
                pct = (c * 100).toFixed(0);
              let cls = "high";
              if (c < 0.4) cls = "low";
              else if (c < 0.65) cls = "medium";
              return `<span class="word-unit ${cls}" title="${
                w.word
              }: ${pct}%"><span class="word-text">${esc(
                w.word
              )}</span><span class="word-score">${pct}%</span><span class="word-bar"></span></span>`;
            })
            .join("");
          wordHTML = `<div class="words-row">${spans}</div><div class="conf-legend">🟢90%+ 🟡40-65% 🔴~40%</div>`;
        } else {
          wordHTML = esc(text);
        }
        d.innerHTML =
          `<div class="label">You</div>${wordHTML}` +
          (meta ? `<div class="meta">${esc(meta)}</div>` : "");
        chatEl.appendChild(d);
        scrollBottom();
      }

      function addAIMsg(reply) {
        const d = document.createElement("div");
        d.className = "msg ai";
        const replayId = "replay_" + Date.now();
        d.innerHTML = `<div class="label">AI Coach</div><div>${esc(reply)}</div>
    <div style="display:flex;gap:8px;flex-wrap:wrap;margin-top:6px">
      <button class="replay-btn" onclick="replayText('${replayId}')">🔄 もう一度聴く</button>
      <button class="replay-btn skip-inline-btn" onclick="skipTTS()" style="border-color:#ffd700;color:#ffd700;background:rgba(255,215,0,.1)">⏭ スキップ</button>
    </div>`;
        d.dataset.replayText = reply;
        d.id = replayId;
        chatEl.appendChild(d);
        scrollBottom();
      }

      function replayText(id) {
        const el = document.getElementById(id);
        if (!el) return;
        const text = el.dataset.replayText;
        if (!text) return;
        if (currentAudio) {
          currentAudio.pause();
          currentAudio.src = "";
          currentAudio = null;
        }
        edgeTTS(text, "en");
      }

      function addLearningCard(learning) {
        const isDebate = lessonMode === "debate";
        const nonDebateBadges = ["easy", "medium", "advanced"];
        const nonDebateLabels = ["初級", "中級", "上級"];
        let sugHTML = "";
        learning.suggestions.forEach((s, i) => {
          let badge, label;
          if (isDebate) {
            const q = (s.quality || "").toLowerCase();
            if (q === "killer") {
              badge = "killer";
              label = "⭐ 最強の切り返し";
            } else if (q === "strong") {
              badge = "strong";
              label = "💪 有効";
            } else if (q === "weak") {
              badge = "weak";
              label = "△ イマイチ";
            } else {
              badge = "pro";
              label = `応答${i + 1}`;
            }
          } else {
            badge = nonDebateBadges[i % nonDebateBadges.length];
            label = nonDebateLabels[i % nonDebateLabels.length];
          }
          sugHTML += `<div class="suggestion-item" onclick="useSuggestion(\`${s.english.replace(
            /`/g,
            ""
          )}\`)">
      <div class="sg-en"><span class="sg-badge ${badge}">${label}</span> ${esc(
            s.english
          )}</div>
      <div class="sg-ja">${esc(s.japanese)}</div></div>`;
        });
        const card = document.createElement("div");
        card.className = "learning-card";
        card.innerHTML = `<div class="lc-header">📚 Learning Corner</div>
    <div class="lc-section"><div class="lc-label">🔤 コーチの回答</div><div class="lc-translation">${esc(
      learning.reply_ja
    )}</div></div>
    <div class="lc-section"><div class="lc-label">💡 解説</div><div class="lc-explanation">${esc(
      learning.explanation
    )}</div></div>
    <div class="lc-section"><div class="lc-label">🗣️ 次に言ってみよう（タップで使用）</div><div class="suggestion-list">${sugHTML}</div></div>`;
        chatEl.appendChild(card);
        scrollBottom();
      }

      function useSuggestion(text) {
        // ★ サジェスション使用時: 無条件でTTS即中断
        abortAllTTS();
        isSpeaking = false;
        aborted = false;
        setTimeout(() => processUserText(text, "suggestion", [], 1.0), 50);
      }

      // ============================================================================
      // Summary Modal
      // ============================================================================
      async function showSummary() {
        if (!sessionId) return;
        openModal(
          "<h2>📊 レッスンまとめを生成中…</h2><p>しばらくお待ちください。</p>"
        );
        try {
          const res = await fetch("/summary", {
            method: "POST",
            headers: { "Content-Type": "application/json" },
            body: JSON.stringify({ session_id: sessionId }),
          });
          const data = await res.json();
          let html = `<h2>📊 レッスンまとめ</h2>`;
          html += `<div class="modal-section"><div class="modal-section-title">📝 総括</div><div class="modal-section-body">${esc(
            data.summary || ""
          )}</div></div>`;
          html += `<div class="modal-section"><div class="modal-section-title">✅ 良かった点</div><div class="modal-section-body">${esc(
            data.strengths || ""
          )}</div></div>`;
          html += `<div class="modal-section"><div class="modal-section-title">📌 改善点</div><div class="modal-section-body">${esc(
            data.weaknesses || ""
          )}</div></div>`;
          if (data.grammar_notes)
            html += `<div class="modal-section"><div class="modal-section-title">📖 文法メモ</div><div class="modal-section-body">${esc(
              data.grammar_notes
            )}</div></div>`;
          if (data.new_expressions)
            html += `<div class="modal-section"><div class="modal-section-title">🆕 新しい表現</div><div class="modal-section-body">${esc(
              data.new_expressions
            )}</div></div>`;
          html += `<div class="modal-section"><div class="modal-section-title">💡 次回へのアドバイス</div><div class="modal-section-body">${esc(
            data.tips || ""
          )}</div></div>`;
          html += `<div class="modal-section"><div class="modal-section-title">💪 励まし</div><div class="modal-section-body">${esc(
            data.encouragement || ""
          )}</div></div>`;
          html += `<div class="modal-section"><div class="modal-section-title">📈 ステータス</div><div class="modal-section-body">ターン数: ${
            data.turn_count || 0
          } | 推定レベル: ${data.estimated_level || "?"}</div></div>`;

          // Score chart
          if (data.score_data && data.score_data.length > 0) {
            html += `<div class="modal-section"><div class="modal-section-title">📊 発音スコア推移</div><div class="score-chart"><div class="score-bar-container">`;
            data.score_data.forEach((sc) => {
              const pct = Math.round(sc.confidence * 100);
              const color =
                pct >= 80
                  ? "var(--green)"
                  : pct >= 60
                  ? "var(--blue)"
                  : pct >= 40
                  ? "var(--yellow)"
                  : "var(--red)";
              html += `<div class="score-bar-wrap"><div class="score-bar" style="height:${pct}%;background:${color}"></div><div class="score-bar-label">${esc(
                sc.word
              )}</div></div>`;
            });
            html += `</div></div></div>`;
          }

          // Wordbook
          if (data.wordbook && data.wordbook.length > 0) {
            html += `<div class="modal-section"><div class="modal-section-title">📒 今日の単語帳（タップで発音）</div><div class="wordbook-list">`;
            data.wordbook.forEach((w) => {
              html += `<span class="wordbook-item" onclick="playWord('${w.replace(
                /'/g,
                ""
              )}')">${esc(w)}</span>`;
            });
            html += `</div></div>`;
          }

          document.getElementById("modal-body").innerHTML = html;
        } catch (err) {
          document.getElementById(
            "modal-body"
          ).innerHTML = `<h2>エラー</h2><p>まとめの生成に失敗しました。</p>`;
        }
      }

      // ============================================================================
      // Minimal Pair Quiz Modal
      // ============================================================================
      async function showQuiz() {
        if (!sessionId) return;
        openModal(
          "<h2>🧩 ミニマルペアクイズを準備中…</h2><p>しばらくお待ちください。</p>"
        );
        try {
          const res = await fetch("/minimal_pair_quiz", {
            method: "POST",
            headers: { "Content-Type": "application/json" },
            body: JSON.stringify({ session_id: sessionId, category: "R vs L" }),
          });
          const data = await res.json();
          let html = `<h2>🧩 ミニマルペアクイズ</h2>`;
          html += `<div class="modal-section"><div class="modal-section-body">${esc(
            data.intro || ""
          )}</div></div>`;
          if (data.pairs) {
            data.pairs.forEach((pair, i) => {
              html += `<div class="quiz-card" style="margin-bottom:12px;">
          <div style="font-size:.75rem;color:var(--text-muted);margin-bottom:6px;">問題 ${
            i + 1
          }</div>
          <div class="quiz-pair">
            <button class="quiz-word-btn" onclick="playWord('${pair.word_a.replace(
              /'/g,
              ""
            )}')">${esc(pair.word_a)}</button>
            <span class="quiz-vs">vs</span>
            <button class="quiz-word-btn" onclick="playWord('${pair.word_b.replace(
              /'/g,
              ""
            )}')">${esc(pair.word_b)}</button>
          </div>
          <div class="quiz-hint">💡 ${esc(pair.hint || "")}</div>
          <div style="font-size:.78rem;color:var(--text);margin-top:6px;line-height:1.5;">${esc(
            pair.explanation || ""
          )}</div>
        </div>`;
            });
          }
          document.getElementById("modal-body").innerHTML = html;
        } catch (err) {
          document.getElementById(
            "modal-body"
          ).innerHTML = `<h2>エラー</h2><p>クイズの生成に失敗しました。</p>`;
        }
      }

      // ============================================================================
      // Modal helpers
      // ============================================================================
      function openModal(initialHTML) {
        document.getElementById("modal-body").innerHTML = initialHTML;
        document.getElementById("modal-overlay").classList.add("visible");
      }
      function closeModal(e) {
        if (e.target === document.getElementById("modal-overlay"))
          closeModalForce();
      }
      function closeModalForce() {
        document.getElementById("modal-overlay").classList.remove("visible");
      }

      // ============================================================================
      // Keyboard
      // ============================================================================
      document.addEventListener("keydown", (e) => {
        if (e.code === "Space" && e.target === document.body) {
          e.preventDefault();
          toggleRecording();
        }
        if (e.code === "Escape") {
          if (
            document
              .getElementById("modal-overlay")
              .classList.contains("visible")
          ) {
            closeModalForce();
          }
        }
      });
    </script>
  </body>
</html>
