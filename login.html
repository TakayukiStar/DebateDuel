<!DOCTYPE html>
<html lang="ja">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>ログイン - Debate Duel</title>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link
      href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@400;500;700&family=JetBrains+Mono:wght@400;500&family=Noto+Sans+JP:wght@400;500;700&display=swap"
      rel="stylesheet"
    />
    <style>
      :root {
        --bg: #0f1117;
        --surface: #1a1d27;
        --surface-2: #252836;
        --surface-3: #2d3142;
        --border: #2e3247;
        --text: #e4e6f0;
        --text-muted: #8b8fa3;
        --accent: #6c5ce7;
        --accent-glow: rgba(108, 92, 231, 0.3);
        --green: #00b894;
        --green-glow: rgba(0, 184, 148, 0.3);
        --red: #e17055;
        --red-glow: rgba(225, 112, 85, 0.3);
        --yellow: #fdcb6e;
        --orange: #e17055;
        --blue: #74b9ff;
        --pink: #fd79a8;
        --radius: 16px;
      }
      * {
        margin: 0;
        padding: 0;
        box-sizing: border-box;
      }
      body {
        font-family: "DM Sans", "Noto Sans JP", sans-serif;
        background: var(--bg);
        color: var(--text);
        min-height: 100vh;
        display: flex;
        flex-direction: column;
        align-items: center;
        justify-content: center;
      }
      .login-wrapper {
        width: 100%;
        max-width: 400px;
        padding: 24px 20px;
      }
      .header {
        text-align: center;
        margin-bottom: 32px;
      }
      .header h1 {
        font-size: 1.5rem;
        font-weight: 700;
        background: linear-gradient(135deg, #e17055, #fdcb6e, #6c5ce7);
        -webkit-background-clip: text;
        -webkit-text-fill-color: transparent;
        background-clip: text;
      }
      .header .subtitle {
        font-size: 0.7rem;
        color: var(--text-muted);
        margin-top: 4px;
        font-family: "JetBrains Mono", monospace;
      }
      .login-card {
        background: var(--surface-2);
        border: 1px solid var(--border);
        border-radius: var(--radius);
        padding: 28px 24px;
      }
      .form-group {
        margin-bottom: 20px;
      }
      .form-group label {
        display: block;
        font-size: 0.75rem;
        font-weight: 600;
        color: var(--text-muted);
        margin-bottom: 8px;
        font-family: "JetBrains Mono", monospace;
      }
      .form-input {
        width: 100%;
        padding: 12px 16px;
        border-radius: 10px;
        border: 2px solid var(--border);
        background: var(--surface);
        color: var(--text);
        font-family: "DM Sans", "Noto Sans JP", sans-serif;
        font-size: 0.9rem;
        outline: none;
        transition: border-color 0.2s;
      }
      .form-input::placeholder {
        color: var(--text-muted);
        opacity: 0.7;
      }
      .form-input:focus {
        border-color: var(--accent);
      }
      .login-btn {
        width: 100%;
        padding: 12px 24px;
        border-radius: 24px;
        font-family: "DM Sans", "Noto Sans JP", sans-serif;
        font-size: 0.9rem;
        font-weight: 600;
        cursor: pointer;
        transition: all 0.2s;
        border: 2px solid var(--green);
        background: rgba(0, 184, 148, 0.12);
        color: var(--green);
        margin-top: 8px;
      }
      .login-btn:hover {
        background: var(--green);
        color: #fff;
        transform: scale(1.02);
      }
      .login-btn:active {
        transform: scale(0.98);
      }
      .links-row {
        display: flex;
        justify-content: space-between;
        align-items: center;
        margin-top: 20px;
        padding-top: 20px;
        border-top: 1px solid var(--border);
      }
      .links-row a {
        font-size: 0.75rem;
        color: var(--blue);
        text-decoration: none;
        transition: color 0.2s;
      }
      .links-row a:hover {
        color: var(--accent);
      }
      .back-link {
        display: inline-flex;
        align-items: center;
        gap: 6px;
        margin-top: 24px;
        padding: 8px 16px;
        background: rgba(108, 92, 231, 0.1);
        border: 1px solid rgba(108, 92, 231, 0.3);
        border-radius: 12px;
        color: var(--accent);
        font-size: 0.8rem;
        font-weight: 600;
        text-decoration: none;
        transition: all 0.2s;
      }
      .back-link:hover {
        background: rgba(108, 92, 231, 0.2);
      }
      .error-msg {
        display: none;
        padding: 10px 14px;
        border-radius: 10px;
        font-size: 0.8rem;
        color: var(--red);
        background: rgba(225, 112, 85, 0.1);
        border: 1px solid rgba(225, 112, 85, 0.3);
        margin-bottom: 16px;
      }
      .error-msg.visible {
        display: block;
        animation: fadeIn 0.3s ease-out;
      }
      @keyframes fadeIn {
        from {
          opacity: 0;
          transform: translateY(-4px);
        }
        to {
          opacity: 1;
          transform: translateY(0);
        }
      }
    </style>
  </head>
  <body>
    <div class="login-wrapper">
      <header class="header">
        <h1>Debate Duel</h1>
        <p class="subtitle">サインイン</p>
      </header>
      <div class="login-card">
        <div class="error-msg" id="errorMsg" role="alert"></div>
        <form id="loginForm" action="#" method="post">
          <div class="form-group">
            <label for="username">ユーザー名 / メール</label>
            <input
              type="text"
              id="username"
              name="username"
              class="form-input"
              placeholder="username@example.com"
              autocomplete="username"
              required
            />
          </div>
          <div class="form-group">
            <label for="password">パスワード</label>
            <input
              type="password"
              id="password"
              name="password"
              class="form-input"
              placeholder="••••••••"
              autocomplete="current-password"
              required
            />
          </div>
          <button type="submit" class="login-btn">ログイン</button>
        </form>
        <div class="links-row">
          <a href="#">パスワードをお忘れですか？</a>
          <a href="#">新規登録</a>
        </div>
      </div>
    </div>
    <script>
      document.getElementById("loginForm").addEventListener("submit", function (e) {
        e.preventDefault();
        var err = document.getElementById("errorMsg");
        err.classList.remove("visible");
        err.textContent = "";

        var username = document.getElementById("username").value.trim();
        var password = document.getElementById("password").value;
        var btn = this.querySelector(".login-btn");

        if (!username || !password) {
          err.textContent = "ユーザー名とパスワードを入力してください。";
          err.classList.add("visible");
          return;
        }

        btn.disabled = true;
        btn.textContent = "ログイン中...";

        fetch("/api/login", {
          method: "POST",
          headers: { "Content-Type": "application/json" },
          credentials: "include",
          body: JSON.stringify({ username: username, password: password }),
        })
          .then(function (res) { return res.json().then(function (data) { return { ok: res.ok, data: data }; }); })
          .then(function (r) {
            if (r.ok && r.data.success) {
              window.location.href = "/";
              return;
            }
            err.textContent = r.data.error || "ログインに失敗しました。";
            err.classList.add("visible");
          })
          .catch(function () {
            err.textContent = "接続エラーが発生しました。";
            err.classList.add("visible");
          })
          .finally(function () {
            btn.disabled = false;
            btn.textContent = "ログイン";
          });
      });
    </script>
  </body>
</html>
